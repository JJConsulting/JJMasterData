name: NuGet Publish

on:
  push:
    branches: [ "main", "rc" ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
        
      - name: Setup NodeJS
        uses: actions/setup-node@v4

      - name: Restore NuGet packages
        run: |
          dotnet restore
    
  nuget-push:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        project:
          - src/MasterData.Commons
          - src/MasterData.Core
          - src/MasterData.Web
          - src/MasterData.WebApi
          - src/ConsoleApps/MasterData.CommandLine
          - src/Plugins/MasterData.Hangfire
          - src/Plugins/MasterData.Pdf
          - src/Plugins/MasterData.Brasil
    steps:
      - uses: actions/checkout@v4
      - name: Build and publish NuGet package
        run: |
          npm install --prefix src/MasterData.Web
          cd ${{ matrix.project }}
          BASE_VERSION=$(dotnet msbuild -nologo -getProperty:Version | tail -n 1 | tr -d '\r')
          if [ "${GITHUB_REF_NAME}" = "rc" ]; then
            PACKAGE_VERSION="${BASE_VERSION}-preview"
          else
            PACKAGE_VERSION="${BASE_VERSION}"
          fi
          dotnet build -c release -p:PackageVersion="${PACKAGE_VERSION}"
          dotnet pack -c release --no-build --output="nuget" -p:PackageVersion="${PACKAGE_VERSION}"
          cd nuget
          dotnet nuget push "*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
